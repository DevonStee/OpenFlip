name: Extract APK Signing Hash

on:
  workflow_dispatch:

jobs:
  extract-hash:
    runs-on: ubuntu-latest

    steps:
      - name: Download APK from release
        run: |
          curl -L -o app-release.apk https://github.com/DevonStee/OpenFlip/releases/download/v0.6.1-beta/app-release.apk

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract APK Signing Certificate SHA256
        run: |
          echo "=== APK Signing Certificate SHA-256 ==="
          apksigner verify --print-certs app-release.apk
          echo "========================================="
          echo ""
          echo "=== SHA-256 digest for AllowedAPKSigningKeys ==="
          apksigner verify --print-certs app-release.apk | grep "certificate SHA-256" | head -1 | awk '{print $NF}' | tr -d ':'
          echo "================================================="
